<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Management - Maguna Minimarket</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #1a7a4a;
            --green-light: #e8f5ee;
            --green-dark: #145c38;
            --red: #dc3545;
            --amber: #f59e0b;
            --amber-light: #fef3c7;
            --text: #1a1a2e;
            --muted: #6b7280;
            --border: #e2e8f0;
            --bg: #f7f9fc;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-image: url(img.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--green-dark);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 16px;
            border: 2px solid var(--green);
            border-radius: 8px;
            transition: all 0.2s ease;
            background: var(--white);
        }

        .back-btn:hover {
            background: var(--green);
            color: var(--white);
            transform: translateX(-2px);
        }

        .back-btn .arrow { font-size: 1rem; transition: transform 0.2s ease; }
        .back-btn:hover .arrow { transform: translateX(-3px); }

        .topbar-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .topbar-title span { color: var(--green); }

        /* ── MAIN CARD ── */
        .dashboard-section {
            width: 90%;
            max-width: 860px;
            margin: 32px auto 0;
            padding: 32px;
            background-color: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        h2 {
            font-family: 'Syne', sans-serif;
            color: var(--text);
            font-size: 1.6rem;
            margin-bottom: 6px;
        }

        .section-desc {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            color: var(--text);
            margin: 32px 0 16px;
        }

        /* ── FORM ── */
        #stockForm {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 12px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input[type="number"] {
            padding: 10px 14px;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            width: 100%;
            color: var(--text);
            background: var(--white);
            transition: border-color 0.2s;
            appearance: auto;
        }

        select:focus, input:focus {
            border-color: var(--green);
            outline: none;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

        .submit-btn {
            padding: 10px 20px;
            background-color: var(--green);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            height: 42px;
            white-space: nowrap;
            transition: background 0.2s, transform 0.1s;
        }

        .submit-btn:hover { background-color: var(--green-dark); }
        .submit-btn:active { transform: scale(0.98); }

        /* ── TABLE ── */
        #stockTable {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        #stockTable th {
            background-color: var(--bg);
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 16px;
            text-align: left;
            border-bottom: 2px solid var(--border);
        }

        #stockTable td {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        #stockTable tr:last-child td { border-bottom: none; }

        #stockTable tr:hover td { background-color: var(--bg); }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .status-ok { background: var(--green-light); color: var(--green-dark); }
        .status-low { background: var(--amber-light); color: var(--amber); }
        .status-critical { background: #fef2f2; color: var(--red); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            #stockForm { grid-template-columns: 1fr; }
            .topbar { padding: 12px 16px; }
            .dashboard-section { width: 95%; padding: 20px; }
        }
    </style>
</head>
<body>

    <nav class="topbar">
        <a href="dashboard.html" class="back-btn">
            <span class="arrow">←</span> Back
        </a>
        <span class="topbar-title">MAGUNA <span>Minimarket</span></span>
        <div style="width:140px"></div>
    </nav>

    <section class="dashboard-section">
        <h2>Stock Management</h2>
        <p class="section-desc">Set low-stock thresholds per product so you get alerted before you run out.</p>

        <form id="stockForm">
            <div class="form-group">
                <label for="product_id">Product</label>
                <select id="product_id" required>
                    <option value="" disabled selected>Select a product</option>
                </select>
            </div>
            <div class="form-group">
                <label for="low_stock_threshold">Low Stock Threshold</label>
                <input type="number" id="low_stock_threshold" placeholder="e.g. 10" required>
            </div>
            <button type="submit" class="submit-btn">Update</button>
        </form>

        <h3>Current Stock</h3>
        <table id="stockTable">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Qty in Stock</th>
                    <th>Alert Threshold</th>
                    <th>Status</th>
                    <th>Last Updated</th>
                </tr>
            </thead>
            <tbody id="stockTableBody">
                <tr><td colspan="5" class="empty-state">Loading...</td></tr>
            </tbody>
        </table>
    </section>

    <script>
        const API_URL = 'http://localhost:3002';

        function getToken() { return localStorage.getItem('token'); }

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${getToken()}`
            };
        }

        // Redirect if not logged in
        if (!getToken()) {
            alert('Please log in first');
            window.location.href = 'login.html';
        }

        // Fetch products for dropdown
        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}/products`, { headers: authHeaders() });
                const products = await res.json();
                const select = document.getElementById('product_id');

                products.forEach(product => {
                    const option = document.createElement('option');
                    option.value = product.id;
                    option.textContent = product.name; // Fixed: was product.product_name
                    select.appendChild(option);
                });
            } catch (err) {
                console.error('Error fetching products:', err);
            }
        }

        // Fetch and display stock table
        async function loadStock() {
            try {
                const res = await fetch(`${API_URL}/stock`, { headers: authHeaders() }); // Fixed: now sends JWT
                const stock = await res.json();
                const tbody = document.getElementById('stockTableBody');

                if (!stock.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No stock thresholds set yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = stock.map(entry => {
                    const qty = entry.quantity_in_stock;
                    const threshold = entry.low_stock_threshold;

                    let statusClass, statusText;
                    if (qty <= 3) {
                        statusClass = 'status-critical'; statusText = '🔴 Critical';
                    } else if (qty <= threshold) {
                        statusClass = 'status-low'; statusText = '🟡 Low';
                    } else {
                        statusClass = 'status-ok'; statusText = '🟢 OK';
                    }

                    return `
                        <tr>
                            <td>${entry.product_name}</td>
                            <td>${qty}</td>
                            <td>${threshold}</td>
                            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                            <td>${new Date(entry.updated_at).toLocaleString()}</td>
                        </tr>
                    `;
                }).join('');
            } catch (err) {
                console.error('Error fetching stock:', err);
                document.getElementById('stockTableBody').innerHTML =
                    '<tr><td colspan="5" class="empty-state">Could not load stock data.</td></tr>';
            }
        }

        // Handle form submission
        document.getElementById('stockForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const product_id = document.getElementById('product_id').value;
            const low_stock_threshold = document.getElementById('low_stock_threshold').value;

            try {
                const res = await fetch(`${API_URL}/add-update-stock-threshold`, {
                    method: 'POST',
                    headers: authHeaders(), // Fixed: now sends JWT
                    body: JSON.stringify({ product_id, low_stock_threshold }),
                });

                const data = await res.json();
                alert(data.message);

                if (res.ok) {
                    document.getElementById('stockForm').reset();
                    loadStock(); // Refresh table without full page reload
                }
            } catch (err) {
                console.error('Error updating stock threshold:', err);
                alert('An error occurred. Please try again.');
            }
        });

        // Init
        loadProducts();
        loadStock();
    </script>
</body>
</html>
