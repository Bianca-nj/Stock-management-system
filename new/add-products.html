<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Maguna Minimarket</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #1a7a4a;
            --green-light: #e8f5ee;
            --green-dark: #145c38;
            --red: #dc3545;
            --blue: #0057b8;
            --orange: #f59e0b;
            --orange-light: #fef3c7;
            --text: #1a1a2e;
            --muted: #6b7280;
            --border: #e2e8f0;
            --bg: #f7f9fc;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-image: url(img.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .topbar {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            display: flex; align-items: center; gap: 8px;
            text-decoration: none; color: var(--green-dark);
            font-weight: 600; font-size: 0.9rem;
            padding: 8px 16px; border: 2px solid var(--green);
            border-radius: 8px; transition: all 0.2s ease; background: var(--white);
        }

        .back-btn:hover { background: var(--green); color: var(--white); transform: translateX(-2px); }
        .back-btn .arrow { font-size: 1rem; transition: transform 0.2s ease; }
        .back-btn:hover .arrow { transform: translateX(-3px); }

        .topbar-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; color: var(--text); letter-spacing: 0.5px; }
        .topbar-title span { color: var(--green); }

        .dashboard-section {
            width: 90%; max-width: 800px;
            margin: 32px auto 0; padding: 32px;
            background-color: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        h2 { font-family: 'Syne', sans-serif; color: var(--text); font-size: 1.6rem; margin-bottom: 24px; }
        h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; color: var(--text); margin: 32px 0 16px; }

        form {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 12px; align-items: end;
        }

        .form-group { display: flex; flex-direction: column; gap: 6px; }

        .form-group label {
            font-size: 0.8rem; font-weight: 600;
            color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
        }

        input[type="text"], input[type="number"] {
            padding: 10px 14px; font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            border: 1.5px solid var(--border); border-radius: 8px;
            width: 100%; transition: border-color 0.2s; color: var(--text);
        }

        input:focus { border-color: var(--green); outline: none; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

        .submit-btn {
            padding: 10px 20px; background-color: var(--green); color: white;
            border: none; border-radius: 8px; cursor: pointer;
            font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
            font-weight: 600; white-space: nowrap;
            transition: background 0.2s, transform 0.1s; height: 42px;
        }

        .submit-btn:hover { background-color: var(--green-dark); }
        .submit-btn:active { transform: scale(0.98); }

        #product-list { display: flex; flex-direction: column; gap: 10px; }

        .product-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; background-color: var(--bg);
            border: 1.5px solid var(--border); border-radius: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .product-item:hover {
            border-color: var(--green);
            box-shadow: 0 2px 10px rgba(26,122,74,0.08);
        }

        .product-info { display: flex; gap: 20px; align-items: center; }
        .product-name { font-weight: 600; color: var(--text); font-size: 0.95rem; }
        .product-meta { font-size: 0.85rem; color: var(--muted); }

        .product-badge {
            background: var(--green-light); color: var(--green-dark);
            padding: 3px 10px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600;
        }

        .action-btns { display: flex; gap: 8px; }

        .btn-edit, .btn-delete, .btn-restock {
            padding: 6px 14px; font-size: 0.82rem;
            font-family: 'DM Sans', sans-serif; font-weight: 600;
            border: none; border-radius: 6px; cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-edit { background-color: var(--blue); color: white; }
        .btn-restock { background-color: var(--orange); color: white; }
        .btn-delete { background-color: var(--red); color: white; }
        .btn-edit:hover, .btn-delete:hover, .btn-restock:hover { opacity: 0.85; }
        .btn-edit:active, .btn-delete:active, .btn-restock:active { transform: scale(0.97); }

        .empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 0.95rem; }

        @media (max-width: 640px) {
            form { grid-template-columns: 1fr; }
            .topbar { padding: 12px 16px; }
            .dashboard-section { width: 95%; padding: 20px; }
        }
    </style>
</head>
<body>

    <nav class="topbar">
        <a href="dashboard.html" class="back-btn">
            <span class="arrow">←</span> Back
        </a>
        <span class="topbar-title">MAGUNA <span>Minimarket</span></span>
        <div style="width:140px"></div>
    </nav>

    <section id="add-products" class="dashboard-section">
        <h2>Add New Product</h2>
        <form id="add-product-form">
            <div class="form-group">
                <label for="product-name">Product Name</label>
                <input type="text" id="product-name" required>
            </div>
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" placeholder="0" required>
            </div>
            <div class="form-group">
                <label for="price">Price (KSh)</label>
                <input type="number" id="price" placeholder="0.00" required>
            </div>
            <button type="submit" class="submit-btn">+ Add</button>
        </form>

        <h3>Product List</h3>
        <div id="product-list"><p class="empty-state">Loading products...</p></div>
    </section>

    <script>
        const API_URL = 'http://localhost:3002';
        function getToken() { return localStorage.getItem('token'); }
        function authHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
        }

        // Add Product
        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('product-name').value;
            const quantity = document.getElementById('quantity').value;
            const price = document.getElementById('price').value;

            try {
                const response = await fetch(`${API_URL}/add-product`, {
                    method: 'POST', headers: authHeaders(),
                    body: JSON.stringify({ name, quantity, price }),
                });
                const data = await response.json();
                if (response.ok) {
                    alert(data.message);
                    document.getElementById('add-product-form').reset();
                    getAllProducts();
                } else { alert(data.message); }
            } catch (error) {
                console.error('Error adding product:', error);
                alert('An error occurred while adding the product');
            }
        });

        // Get All Products
        async function getAllProducts() {
            try {
                const response = await fetch(`${API_URL}/products`, { headers: authHeaders() });
                const products = await response.json();
                const productList = document.getElementById('product-list');
                productList.innerHTML = '';

                if (!products.length) {
                    productList.innerHTML = '<p class="empty-state">No products yet. Add one above!</p>';
                    return;
                }

                products.forEach(product => {
                    const productDiv = document.createElement('div');
                    productDiv.className = 'product-item';
                    productDiv.innerHTML = `
                        <div class="product-info">
                            <span class="product-name">${product.name}</span>
                            <span class="product-meta">Qty: ${product.quantity}</span>
                            <span class="product-badge">KSh ${parseFloat(product.price).toFixed(2)}</span>
                        </div>
                        <div class="action-btns">
                            <button class="btn-restock" onclick="restockProduct(${product.id}, '${product.name}')">Restock</button>
                            <button class="btn-edit" onclick="editProduct(${product.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteProduct(${product.id})">Delete</button>
                        </div>
                    `;
                    productList.appendChild(productDiv);
                });
            } catch (error) {
                console.error('Error fetching products:', error);
                document.getElementById('product-list').innerHTML = '<p class="empty-state">Could not load products.</p>';
            }
        }

        // Restock Product
        async function restockProduct(id, name) {
            const quantityAdded = prompt(`How many units are you adding for "${name}"?`);
            if (!quantityAdded || isNaN(quantityAdded) || parseInt(quantityAdded) <= 0) {
                alert('Please enter a valid quantity');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/restock`, {
                    method: 'POST', headers: authHeaders(),
                    body: JSON.stringify({ product_id: id, quantity_added: parseInt(quantityAdded) }),
                });
                const data = await response.json();
                if (response.ok) {
                    alert(`✅ Restocked "${name}" — added ${quantityAdded} units.\nNew stock: ${data.new_quantity}`);
                    getAllProducts();
                } else { alert(data.message); }
            } catch (error) {
                console.error('Error restocking product:', error);
                alert('An error occurred while restocking');
            }
        }

        // Edit Product — only name and price, NOT quantity
       async function editProduct(id) {
    // Fetch current product details first
    const response = await fetch(`${API_URL}/products`, { headers: authHeaders() });
    const products = await response.json();
    const product = products.find(p => p.id === id);

    // Show current value in prompt — user can change or just press OK to keep it
    const name = prompt('Product name:', product.name) ?? product.name;
    const price = prompt('Price (KSh):', product.price) ?? product.price;

    // If user hit Cancel on both, do nothing
    if (name === null && price === null) return;

    try {
        const response = await fetch(`${API_URL}/update-product/${id}`, {
            method: 'PUT', headers: authHeaders(),
            body: JSON.stringify({ name, price }),
        });
        const data = await response.json();
        if (response.ok) { alert('Product updated successfully'); getAllProducts(); }
        else alert(data.message);
    } catch (error) {
        console.error('Error updating product:', error);
        alert('An error occurred while updating the product');
    }
}

        // Delete Product
        async function deleteProduct(id) {
            if (!id) return;
            if (!confirm('Are you sure you want to delete this product?')) return;

            try {
                const response = await fetch(`${API_URL}/delete-product/${id}`, {
                    method: 'DELETE', headers: authHeaders()
                });
                const data = await response.json();
                if (response.ok) { alert('Product deleted successfully'); getAllProducts(); }
                else alert(data.message || 'Failed to delete the product');
            } catch (error) {
                console.error('Error deleting product:', error);
                alert('An error occurred while deleting the product');
            }
        }

        window.onload = getAllProducts;
    </script>
</body>
</html>
