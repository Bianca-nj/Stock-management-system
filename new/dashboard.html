<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maguna Minimarket Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #0f1923;
            --sidebar-active: #1a7a4a;
            --sidebar-hover: rgba(26,122,74,0.15);
            --main-bg: #f0f4f8;
            --card-bg: #ffffff;
            --text-primary: #0f1923;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --green: #1a7a4a;
            --green-light: #e8f5ee;
            --amber: #f59e0b;
            --amber-light: #fef3c7;
            --blue: #3b82f6;
            --blue-light: #eff6ff;
            --red: #ef4444;
            --red-light: #fef2f2;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--main-bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
        }

        /* ── SIDEBAR ── */
        #sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        #sidebar::before {
            content: '';
            position: absolute;
            top: -60px; left: -60px;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(26,122,74,0.3) 0%, transparent 70%);
            pointer-events: none;
        }

        .sidebar-brand {
            padding: 28px 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .brand-icon {
            width: 38px; height: 38px;
            background: var(--green);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
            font-size: 1.1rem; color: white;
        }

        .sidebar-brand h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem; color: white; font-weight: 700;
        }

        .sidebar-brand p {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            margin-top: 2px;
        }

        .sidebar-section-label {
            font-size: 0.65rem; font-weight: 600;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            padding: 20px 24px 8px;
        }

        #sidebar ul { list-style: none; padding: 0 12px; flex: 1; }

        #sidebar ul li a {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none;
            color: rgba(255,255,255,0.55);
            font-size: 0.9rem; font-weight: 500;
            padding: 11px 14px; border-radius: 10px;
            transition: all 0.2s ease; margin-bottom: 2px;
        }

        #sidebar ul li a i { width: 20px; text-align: center; font-size: 0.85rem; }

        #sidebar ul li a:hover {
            background: var(--sidebar-hover);
            color: rgba(255,255,255,0.9);
        }

        #sidebar ul li a.active {
            background: var(--sidebar-active);
            color: white;
            box-shadow: 0 4px 12px rgba(26,122,74,0.4);
        }

        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .logout-btn {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none;
            color: rgba(255,255,255,0.4);
            font-size: 0.88rem; font-weight: 500;
            padding: 11px 14px; border-radius: 10px;
            transition: all 0.2s;
        }

        .logout-btn:hover { background: rgba(239,68,68,0.12); color: #ef4444; }

        /* ── MAIN ── */
        #main-content {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }

        .topbar {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0 32px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }

        .topbar-left h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem; font-weight: 700; color: var(--text-primary);
        }

        .topbar-left p { font-size: 0.78rem; color: var(--text-muted); margin-top: 1px; }

        .topbar-user { display: flex; align-items: center; gap: 10px; }

        .user-avatar {
            width: 36px; height: 36px;
            background: var(--green); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 0.85rem;
        }

        .user-name { font-size: 0.88rem; font-weight: 600; color: var(--text-primary); }

        /* ── PAGE CONTENT ── */
        #page-content { flex: 1; overflow-y: auto; padding: 28px 32px; }

        /* ── OVERVIEW ── */
        .overview-header { margin-bottom: 28px; animation: fadeUp 0.4s ease both; }

        .overview-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem; font-weight: 800; color: var(--text-primary);
        }

        .overview-header p { color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px; }

        .stat-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 20px; margin-bottom: 28px;
        }

        .stat-card {
            background: var(--card-bg); border-radius: 16px; padding: 24px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            position: relative; overflow: hidden;
            animation: fadeUp 0.4s ease both;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:nth-child(2) { animation-delay: 0.08s; }
        .stat-card:nth-child(3) { animation-delay: 0.16s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

        .stat-card::after {
            content: ''; position: absolute; top: 0; right: 0;
            width: 80px; height: 80px;
            border-radius: 0 16px 0 80px; opacity: 0.07;
        }

        .stat-card.green::after { background: var(--green); }
        .stat-card.amber::after { background: var(--amber); }
        .stat-card.blue::after { background: var(--blue); }

        .stat-icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; margin-bottom: 16px;
        }

        .stat-card.green .stat-icon { background: var(--green-light); color: var(--green); }
        .stat-card.amber .stat-icon { background: var(--amber-light); color: var(--amber); }
        .stat-card.blue .stat-icon { background: var(--blue-light); color: var(--blue); }

        .stat-label {
            font-size: 0.78rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--text-muted); margin-bottom: 6px;
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 2rem; font-weight: 800;
            color: var(--text-primary); line-height: 1;
        }

        .stat-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }

        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .panel {
            background: var(--card-bg); border-radius: 16px; padding: 24px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            animation: fadeUp 0.5s ease both; animation-delay: 0.25s;
        }

        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }

        .panel-header h4 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem; font-weight: 700; color: var(--text-primary);
        }

        .panel-badge {
            font-size: 0.72rem; font-weight: 600;
            padding: 4px 10px; border-radius: 20px;
        }

        .badge-red { background: var(--red-light); color: var(--red); }

        .stock-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid var(--border);
        }

        .stock-item:last-child { border-bottom: none; }
        .stock-item-name { font-size: 0.88rem; font-weight: 500; color: var(--text-primary); }

        .stock-item-qty {
            font-size: 0.78rem; font-weight: 600;
            padding: 3px 10px; border-radius: 20px;
        }

        .qty-critical { background: var(--red-light); color: var(--red); }
        .qty-low { background: var(--amber-light); color: var(--amber); }

        .quick-links { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .quick-link {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 8px;
            text-decoration: none;
            padding: 20px 12px; border-radius: 12px;
            border: 1.5px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.82rem; font-weight: 600;
            transition: all 0.2s; text-align: center;
        }

        .quick-link i { font-size: 1.3rem; }
        .quick-link:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }

        .empty-msg { text-align: center; color: var(--text-muted); font-size: 0.85rem; padding: 20px 0; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #page-content::-webkit-scrollbar { width: 6px; }
        #page-content::-webkit-scrollbar-track { background: transparent; }
        #page-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon"><i class="fas fa-store"></i></div>
            <h2>Maguna Minimarket</h2>
            <p>Management System</p>
        </div>
        <div class="sidebar-section-label">Navigation</div>
        <ul>
            <li><a href="stock-management.html"><i class="fas fa-boxes"></i> Stock Management</a></li>
            <li><a href="sales.html"><i class="fas fa-receipt"></i> Sales</a></li>
            <li><a href="add-products.html"><i class="fas fa-tag"></i> Products</a></li>
            <li><a href="reports.html"><i class="fas fa-file-alt"></i> Reports</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="login.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Log Out</a>
        </div>
    </nav>

    <div id="main-content">
        <div class="topbar">
            <div class="topbar-left">
                <h3>Dashboard</h3>
                <p id="topbar-date"></p>
            </div>
            <div class="topbar-user">
                <div class="user-avatar" id="user-avatar">M</div>
                <span class="user-name" id="user-name">User</span>
            </div>
        </div>
        <div id="page-content"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3002';
        function getToken() { return localStorage.getItem('token'); }
        function authHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
        }

        if (!getToken()) window.location.href = 'login.html';

        const now = new Date();
        document.getElementById('topbar-date').textContent = now.toLocaleDateString('en-KE', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        const username = localStorage.getItem('username') || 'User';
        document.getElementById('user-name').textContent = username;
        document.getElementById('user-avatar').textContent = username.charAt(0).toUpperCase();

        function getGreeting() {
            const h = new Date().getHours();
            if (h < 12) return 'morning';
            if (h < 17) return 'afternoon';
            return 'evening';
        }

        async function renderOverview() {
            document.getElementById('page-content').innerHTML = `
                <div class="overview-header">
                    <h2>Good ${getGreeting()}, ${username} 👋</h2>
                    <p>Here's what's happening at Maguna Minimarket today.</p>
                </div>
                <div class="stat-grid">
                    <div class="stat-card green">
                        <div class="stat-icon"><i class="fas fa-cubes"></i></div>
                        <div class="stat-label">Total Products</div>
                        <div class="stat-value" id="stat-products">—</div>
                        <div class="stat-sub">Items in inventory</div>
                    </div>
                    <div class="stat-card amber">
                        <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="stat-label">Low Stock</div>
                        <div class="stat-value" id="stat-lowstock">—</div>
                        <div class="stat-sub">Items below 10 units</div>
                    </div>
                    <div class="stat-card blue">
                        <div class="stat-icon"><i class="fas fa-coins"></i></div>
                        <div class="stat-label">Sales Today</div>
                        <div class="stat-value" id="stat-sales">—</div>
                        <div class="stat-sub">Revenue for today</div>
                    </div>
                </div>
                <div class="bottom-grid">
                    <div class="panel">
                        <div class="panel-header">
                            <h4><i class="fas fa-exclamation-circle" style="color:var(--red);margin-right:8px;font-size:0.9rem"></i>Low Stock Alerts</h4>
                            <span class="panel-badge badge-red" id="low-stock-count">Loading...</span>
                        </div>
                        <div id="low-stock-list"><p class="empty-msg">Loading...</p></div>
                    </div>
                    <div class="panel">
                        <div class="panel-header">
                            <h4><i class="fas fa-bolt" style="color:var(--green);margin-right:8px;font-size:0.9rem"></i>Quick Actions</h4>
                        </div>
                        <div class="quick-links">
                            <a href="add-products.html" class="quick-link"><i class="fas fa-plus-circle"></i>Add Product</a>
                            <a href="sales.html" class="quick-link"><i class="fas fa-receipt"></i>Record Sale</a>
                            <a href="stock-management.html" class="quick-link"><i class="fas fa-boxes"></i>Manage Stock</a>
                            <a href="reports.html" class="quick-link"><i class="fas fa-file-download"></i>Download Report</a>
                        </div>
                    </div>
                </div>
            `;

            try {
                const res = await fetch(`${API_URL}/overview`, { headers: authHeaders() });
                const data = await res.json();
                document.getElementById('stat-products').textContent = data.total_products ?? '0';
                document.getElementById('stat-lowstock').textContent = data.low_stock ?? '0';
                document.getElementById('stat-sales').textContent = `KSh ${parseFloat(data.sales_today || 0).toLocaleString('en-KE', { minimumFractionDigits: 2 })}`;
            } catch (err) { console.error('Overview error:', err); }

           try {
    const res = await fetch(`${API_URL}/stock`, { headers: authHeaders() });
    const stock = await res.json();

    // Only show products where quantity is at or below their set threshold
    const lowStock = stock.filter(p => p.quantity_in_stock <= p.low_stock_threshold);

    document.getElementById('low-stock-count').textContent = `${lowStock.length} item${lowStock.length !== 1 ? 's' : ''}`;
    const listEl = document.getElementById('low-stock-list');
    listEl.innerHTML = lowStock.length === 0
        ? '<p class="empty-msg">✅ All products are well stocked!</p>'
        : lowStock.map(p => `
            <div class="stock-item">
                <span class="stock-item-name">${p.product_name}</span>
                <span class="stock-item-qty ${p.quantity_in_stock <= 3 ? 'qty-critical' : 'qty-low'}">${p.quantity_in_stock} left</span>
            </div>`).join('');
} catch (err) {
    document.getElementById('low-stock-list').innerHTML = '<p class="empty-msg">Could not load stock data.</p>';
}
        }

        renderOverview();
    </script>
</body>
</html>
