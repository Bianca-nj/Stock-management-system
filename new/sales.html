<style>
  :root {
            --green: #1a7a4a;
            --green-light: #e8f5ee;
            --green-dark: #145c38;
            --red: #dc3545;
            --blue: #0057b8;
            --text: #1a1a2e;
            --muted: #6b7280;
            --border: #e2e8f0;
            --bg: #f7f9fc;
            --white: #ffffff;
        }

        
body {
  font-family: Arial, sans-serif;
  background-image: url(img.jpg);
  background-repeat: no-repeat; 
  background-size: cover; 
  background-position: center; 
  margin: 0;
  padding: 0;
}

 /* ── TOP NAV ── */
        .topbar {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--green-dark);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 16px;
            border: 2px solid var(--green);
            border-radius: 8px;
            transition: all 0.2s ease;
            background: var(--white);
        }

        .back-btn:hover {
            background: var(--green);
            color: var(--white);
            transform: translateX(-2px);
        }

        .back-btn .arrow {
            font-size: 1rem;
            transition: transform 0.2s ease;
        }

        .back-btn:hover .arrow {
            transform: translateX(-3px);
        }

        .topbar-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .topbar-title span {
            color: var(--green);
        }

/* Sales Section */
#sales {
  background-color: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  max-width: 900px;
  margin: 20px auto;
}

#sales h2 {
  color: #FF7043;
  text-align: center;
}

#sales p {
  text-align: center;
  color: #555;
  font-size: 1.1em;
  margin-bottom: 20px;
}

/* Sale Form */
#saleForm {
  display: flex;
  flex-direction: column;
  gap: 15px;
  max-width: 500px;
  margin: 0 auto;
}

#saleForm label {
  font-size: 1.1em;
  color: #333;
}

#saleForm select, 
#saleForm input[type="number"] {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 1em;
  width: 100%;
}

#saleForm button {
  padding: 12px;
  background-color: #FF7043;
  color: white;
  font-size: 1.1em;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

#saleForm button:hover {
  background-color: #e65c41;
}

/* Sales Records Table */
#salesTable {
  width: 100%;
  margin-top: 40px;
  border-collapse: collapse;
}

#salesTable th, 
#salesTable td {
  padding: 12px;
  text-align: left;
  border: 1px solid #ddd;
}

#salesTable th {
  background-color: #f2f2f2;
  color: #333;
}

#salesTable tr:nth-child(even) {
  background-color: #f9f9f9;
}

#salesTable tr:hover {
  background-color: #f1f1f1;
}

#salesTable td {
  font-size: 1em;
  color: #555;
}

</style>
 <!-- TOP NAV WITH BACK BUTTON -->
    <nav class="topbar">
        <a href="dashboard.html" class="back-btn">
            <span class="arrow">←</span> Back 
        </a>
        <span class="topbar-title">MAGUNA <span>Minimarket</span></span>
        <div style="width:140px"></div> <!-- spacer to center title -->
    </nav>

<section id="sales" class="dashboard-section">


    <!-- Sale Form - Removed Sale Amount Field -->
    <form id="saleForm">
        <label for="product_id">Product:</label>
        <select id="product_id" name="product_id" required>
            <option value="" disabled selected>Select a product</option>
            <!-- Products will be dynamically populated here -->
        </select>

        <label for="quantity_sold">Quantity Sold:</label>
        <input type="number" id="quantity_sold" name="quantity_sold" required min="1">

        <button type="submit">Submit Sale</button>
    </form>

    <!-- Sales Table -->
    <h3>Sales Records</h3>
    <table id="salesTable">
        <thead>
            <tr>
                <th>Product</th>
                <th>Quantity Sold</th>
                <th>Unit Price</th>
                <th>Total Amount</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            <!-- Sales will be populated here -->
        </tbody>
    </table>
   
</section>

<script>
// Store products data for real-time calculation
let productsData = [];

// Fetch products and populate the dropdown with real-time calculation
document.addEventListener('DOMContentLoaded', function() {
    fetch('http://localhost:3002/products', {
        headers: {
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        }
    })
        .then(response => response.json())
        .then(products => {
            productsData = products;
            const productSelect = document.getElementById('product_id');
            products.forEach(product => {
                const option = document.createElement('option');
                option.value = product.id;
                option.textContent = `${product.name}`;
                productSelect.appendChild(option);
            });
        })
        .catch(error => console.error('Error fetching products:', error));

    // Fetch and display existing sales
    fetchSales();
});

// Real-time calculation when quantity or product changes
document.getElementById('product_id').addEventListener('change', calculateTotal);
document.getElementById('quantity_sold').addEventListener('input', calculateTotal);

function calculateTotal() {
    const productId = document.getElementById('product_id').value;
    const quantity = parseInt(document.getElementById('quantity_sold').value) || 0;
    
    if (productId && quantity > 0) {
        const selectedProduct = productsData.find(p => p.id == productId);
        if (selectedProduct) {
            const total = selectedProduct.price * quantity;
            document.getElementById('calculatedAmount').innerHTML = `
                Total Amount: <strong>KSh ${total.toFixed(2)}</strong>
                <br><small style="color: #666;">Unit Price: KSh ${selectedProduct.price.toFixed(2)}</small>
            `;
        }
    } 
}

function fetchSales() {
    fetch('http://localhost:3002/sales', {
        headers: {
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        }
    })
        .then(response => response.json())
        .then(sales => {
            const salesTable = document.getElementById('salesTable').getElementsByTagName('tbody')[0];
            salesTable.innerHTML = ''; // Clear existing rows
            
            sales.forEach(sale => {
                const row = salesTable.insertRow();
                row.innerHTML = `
                    <td>${sale.product_name}</td>
                    <td>${sale.quantity_sold}</td>
                    <td>KSh ${parseFloat(sale.unit_price || (sale.total_price / sale.quantity_sold)).toFixed(2)}</td>
                    <td>KSh ${parseFloat(sale.total_price).toFixed(2)}</td>
                    <td>${new Date(sale.sale_date).toLocaleString()}</td>
                `;
            });
        })
        .catch(error => console.error('Error fetching sales:', error));
}

// Handle sale form submission
document.getElementById('saleForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const product_id = document.getElementById('product_id').value;
    const quantity_sold = document.getElementById('quantity_sold').value;
    
    if (!product_id || !quantity_sold) {
        alert('Please select a product and enter quantity');
        return;
    }

    const token = localStorage.getItem('token');
    if (!token) {
        alert('Please login first');
        window.location.href = 'login.html';
        return;
    }

    const saleData = { 
        product_id, 
        quantity_sold: parseInt(quantity_sold)
    };

    try {
        const response = await fetch('http://localhost:3002/add-sale', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(saleData),
        });
        
        const data = await response.json();
        
        if (response.ok) {
            alert(data.message + `\nTotal Amount: KSh ${data.total_amount}\nRemaining Stock: ${data.remaining_stock}`);
            // Reset form
            document.getElementById('saleForm').reset();
            // Refresh sales list
            fetchSales();
            // Refresh products dropdown to show updated stock
            refreshProducts();
        } else {
            alert(data.message || 'Error recording sale');
        }
    } catch (error) {
        console.error('Error adding sale:', error);
        alert('An error occurred while recording the sale');
    }
});

// Function to refresh products dropdown after sale
function refreshProducts() {
    fetch('http://localhost:3002/products', {
        headers: {
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        }
    })
        .then(response => response.json())
        .then(products => {
            productsData = products;
            const productSelect = document.getElementById('product_id');
            productSelect.innerHTML = '<option value="" disabled selected>Select a product</option>';
            products.forEach(product => {
                const option = document.createElement('option');
                option.value = product.id;
                option.setAttribute('data-price', product.price);
                option.textContent = `${product.name} - KSh ${parseFloat(product.price).toFixed(2)} (Stock: ${product.quantity})`;
                productSelect.appendChild(option);
            });
        })
        .catch(error => console.error('Error refreshing products:', error));
}
</script>
